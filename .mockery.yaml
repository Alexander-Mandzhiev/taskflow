with-expecter: true
dir: "{{.InterfaceDir}}/mocks"
filename: "mock_{{.InterfaceNameSnake}}.go"
outpkg: "mocks"
mockname: "{{.InterfaceName}}"
resolve-type-alias: false
issue-845-fix: true
disable-version-string: true

# Моки генерируются только для internal (сервисы, репозитории).
# Для pkg/ не генерируем — в тестах обычно достаточно noop/реальных реализаций.
packages:
  # Identity — user
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/identity/user/service:
    config:
      include-regex: ".*Service"
  # User repository — адаптер
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/identity/user/repository:
    config:
      include-regex: ".*Repository"
  # User repository — контракты reader/writer
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/identity/user/repository/user:
    config:
      include-regex: ".*Repository"
  # User repository — контракт кеша
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/identity/user/repository/cache:
    config:
      include-regex: ".*Repository"

  # Identity — account
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/identity/account/service:
    config:
      include-regex: ".*Service"
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/identity/account/repository:
    config:
      include-regex: ".*Repository"

  # Workspace — team
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/team/service:
    config:
      include-regex: ".*Service"
  # Team repository — контракт адаптера (TeamAdapter)
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/team/repository:
    config:
      include-regex: ".*Adapter"
  # Team repository — контракты reader/writer для teams
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/team/repository/team:
    config:
      include-regex: ".*Repository"
  # Team repository — контракты reader/writer для team_members
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/team/repository/member:
    config:
      include-regex: ".*Repository"
  # Team repository — контракты reader/writer для team_invitations
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/team/repository/invitation:
    config:
      include-regex: ".*Repository"

  # Workspace — task
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/task/service:
    config:
      include-regex: ".*Service"
  # Task repository — адаптер (контракты TaskRepository, TaskHistoryRepository, ReportRepository)
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/task/repository:
    config:
      include-regex: ".*Repository"
  # Task repository — контракты reader/writer для tasks
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/task/repository/repository/task:
    config:
      include-regex: ".*Repository"
  # Task repository — контракты reader/writer для task_history
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/task/repository/repository/history:
    config:
      include-regex: ".*Repository"
  # Task repository — контракты reader/writer для task_comments
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/task/repository/repository/comment:
    config:
      include-regex: ".*Repository"
  # Task repository — контракт reader для отчётов
  github.com/Alexander-Mandzhiev/taskflow/backend/internal/module/workspace/task/repository/repository/report:
    config:
      include-regex: ".*Repository"
