name: CI

on:
  push:
  pull_request:

# Версии и пути берём из Taskfile.yml через extract-versions.sh (один источник правды).

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extract vars from Taskfile
        run: bash .github/scripts/extract-versions.sh

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Task
        uses: arduino/setup-task@v2.0.0

      - name: Run lint
        run: task lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extract vars from Taskfile
        run: bash .github/scripts/extract-versions.sh

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Task
        uses: arduino/setup-task@v2.0.0

      - name: Run tests
        run: task test

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    env:
      # отчёты в coverage/ в корне репо (Taskfile: ROOT_DIR/coverage)
      COVERAGE_DIR: coverage
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Extract vars from Taskfile
        run: bash .github/scripts/extract-versions.sh

      - name: Set up Go
        uses: actions/setup-go@v5.4.0
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Task
        uses: arduino/setup-task@v2.0.0

      - name: Run tests with coverage
        run: task test-coverage

      # 1. Сохраняем процент покрытия в переменную и показываем в сводке джоба
      # go tool cover требует контекст модуля (go.mod) → запускаем из backend/, файл в ../coverage/
      - name: Show coverage total in summary
        id: coverage
        working-directory: backend
        run: |
          COVER_FILE="../${{ env.COVERAGE_DIR }}/${{ env.COVERAGE_FILE }}"
          if [ ! -f "$COVER_FILE" ]; then
            echo "::error::Coverage file not found: $COVER_FILE"
            echo "## 📊 Coverage (overall)" >> $GITHUB_STEP_SUMMARY
            echo "❌ Файл отчёта не найден. Проверьте генерацию покрытия." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          LINE=$(go tool cover -func="$COVER_FILE" 2>&1 | tail -1)
          echo "$LINE"
          if [[ "$LINE" =~ total:.*[[:space:]]([0-9.]+%)$ ]]; then
            TOTAL="${BASH_REMATCH[1]}"
          else
            echo "::warning::Не удалось распознать процент покрытия. Вывод: $LINE"
            TOTAL="N/A"
          fi
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          {
            echo "## 📊 Coverage (overall)"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| **Total** | **$TOTAL** |"
            echo ""
            echo "Подробный отчёт — в артефакте \`coverage-report\` (скачать и открыть \`coverage.html\`)."
          } >> $GITHUB_STEP_SUMMARY

      # 2. Генерируем HTML-отчет для подробного просмотра (coverage/ в корне репо)
      - name: Generate coverage HTML
        working-directory: backend
        run: go tool cover -html=../${{ env.COVERAGE_DIR }}/${{ env.COVERAGE_FILE }} -o ../${{ env.COVERAGE_DIR }}/coverage.html

      # 3. Загружаем отчет как артефакт
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.COVERAGE_DIR }}/coverage.html
          retention-days: 7

  # Проверка сборки образа при каждом запуске CI.
  docker-build:
    name: Build image (no push)
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Build backend image (cached, no push)
        uses: docker/build-push-action@v6.0.0
        with:
          context: .
          file: deploy/docker/backend/Dockerfile
          push: false
          tags: taskflow-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
