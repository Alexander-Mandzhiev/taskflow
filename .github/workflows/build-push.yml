# =============================================================================
# Сборка образа backend и публикация в GitHub Container Registry (ghcr.io).
# Сборка и push — только после успешного lint + test.
# На сервере: задать IMAGE_TAG (sha или latest) и сделать pull + up.
# =============================================================================

name: Build and Push

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Tag (optional, default: git sha or tag v*)'
        required: false

env:
  REGISTRY: ghcr.io

jobs:
  # Сначала проверяем код (как в ci.yml), чтобы не пушить образ при падающих тестах.
  test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Extract vars from Taskfile
        run: bash .github/scripts/extract-versions.sh
      - uses: actions/setup-go@v5.4.0
        with:
          go-version-file: backend/go.mod
          cache: true
          cache-dependency-path: backend/go.sum
      - uses: arduino/setup-task@v2.0.0
      - run: task lint
      - run: task test

  # На PR — только проверить, что образ собирается (без push).
  build-only:
    needs: test
    if: github.event_name == 'pull_request'
    name: Build image (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Build backend image (cached, no push)
        uses: docker/build-push-action@v6.0.0
        with:
          context: .
          file: deploy/docker/backend/Dockerfile
          push: false
          tags: taskflow-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    name: Build and push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag_override }}" ]; then
            echo "tag=${{ github.event.inputs.tag_override }}" >> $GITHUB_OUTPUT
          elif [ "x${GITHUB_REF#refs/tags/}" != "x$GITHUB_REF" ]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to Container Registry
        uses: docker/login-action@v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5.0.0
        with:
          # Отдельный пакет под backend (удобно для будущих frontend/worker образов)
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/taskflow-backend
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6.0.0
        with:
          context: .
          file: deploy/docker/backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
