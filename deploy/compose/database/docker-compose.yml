services:
  mysql:
    image: mysql:8.4
    env_file:
      - ../../env/${MODE:-local}/.env
    # Обязательные для инициализации MySQL (подставляются из --env-file при запуске compose)
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mkk}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    container_name: mkk-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_net

volumes:
  mysql_data:

networks:
  app_net:
    name: ${DOCKER_NETWORK_NAME:-taskflow-local}
    external: true
