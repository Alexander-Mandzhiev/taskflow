services:
  # Jaeger для локальной разработки (in-memory storage)
  jaeger:
    image: jaegertracing/jaeger:2.6.0
    container_name: jaeger
    env_file:
      - ${ENV_FILE}
    # UI доступен через Traefik (см. deploy/docker/traefik/dynamic.yml)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      STORAGE_TYPE: memory
      MEMORY_MAX_TRACES: "10000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    name: ${DOCKER_NETWORK_NAME:-taskflow-local}
    external: true
