# Backend — образ из registry (собирается в CI, см. .github/workflows/build-push.yml).
# Конфиг production.yaml вшит в образ; переменные (MYSQL_*, REDIS_*, SESSION_*) — из env_file.
# Чтобы подменить конфиг с хоста, раскомментируйте volume ниже.

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/alexander-mandzhiev/taskflow-backend}:${IMAGE_TAG:-latest}
    container_name: schedule_backend
    restart: unless-stopped
    env_file:
      - ../../env/${MODE:-local}/.env
    environment:
      CONFIG_PATH: ${CONFIG_PATH:-/app/config/production.yaml}
    # volumes:
    #   - ./config/production.yaml:/app/config/production.yaml:ro
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  app_net:
    name: ${DOCKER_NETWORK_NAME:-taskflow-local}
    external: true
