# ============================================================================
# Traefik Static Configuration
# ============================================================================
# Статическая конфигурация Traefik для dev режима (без HTTPS)
# Traefik автоматически подставляет переменные окружения из ${VAR} или ${VAR:-default}
# ============================================================================

# Логирование
log:
  level: INFO
  format: common

# Access logs (для fail2ban/аналитики)
accessLog:
  filePath: /var/log/traefik/access.log
  format: json
  filters:
    statusCodes:
      - "400-499"
      - "500-599"

# API и Dashboard
api:
  dashboard: true
  insecure: true  # Для dev - прямой доступ без авторизации

# Точки входа (Entrypoints)
entryPoints:
  web:
    address: ":80"
    # HTTP -> HTTPS редирект отключен для dev
    # http:
    #   redirections:
    #     entryPoint:
    #       to: websecure
    #       scheme: https
    #       permanent: false

  # HTTPS entrypoint отключен для dev
  # websecure:
  #   address: ":443"

# Провайдеры конфигурации
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    # network берется из переменной окружения DOCKER_NETWORK_NAME из .env файла
    # (оставляем переменную, т.к. имя сети может отличаться в разных окружениях)
    network: "${DOCKER_NETWORK_NAME}"
    watch: true
  
  # File provider для динамической конфигурации (роутеры, middleware)
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

# Let's Encrypt (отключен для dev)
# certificatesResolvers:
#   le:
#     acme:
#       email: "${ACME_EMAIL:-}"
#       storage: /letsencrypt/acme.json
